<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KCET Learning Quiz</title>

  <!-- jQuery CDN -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .quiz-container {
      background: #ffffff;
      padding: 20px;
      width: 350px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 15px;
    }

    .options {
      text-align: left;
      margin: 10px 0;
    }

    .options label {
      display: block;
      margin-bottom: 8px;
      cursor: pointer;
    }

    button {
      padding: 8px 14px;
      margin: 8px 5px;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      background: #cccccc;
      cursor: not-allowed;
    }

    #result {
      font-size: 18px;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <div class="quiz-container">
    <h2 id="question"></h2>

    <div class="options" id="options"></div>

    <div>
      <button id="prevBtn">Previous</button>
      <button id="nextBtn">Next</button>
    </div>

    <div id="result"></div>
  </div>

  <script>
    const quizData = [
      {
        question: "What does HTML stand for?",
        options: [
          "Hyper Text Markup Language",
          "High Tech Modern Language",
          "Hyperlinks and Text Markup",
          "Home Tool Markup Language",
        ],
        answer: 0,
      },
      {
        question: "Which symbol is used for jQuery?",
        options: ["#", "$", "@", "%"],
        answer: 1,
      },
      {
        question: "Which method is used to hide elements in jQuery?",
        options: ["hide()", "display(none)", "remove()", "invisible()"],
        answer: 0,
      },
    ];

    let currentQuestion = 0;
    let userAnswers = new Array(quizData.length).fill(null);

    function loadQuestion() {
      const q = quizData[currentQuestion];

      $("#question").fadeOut(200, function () {
        $(this).text(q.question).fadeIn(200);
      });

      const optionsHtml = q.options
        .map((opt, i) => `
          <label>
            <input type="radio" name="option" value="${i}" 
              ${userAnswers[currentQuestion] === i ? "checked" : ""}>
            ${opt}
          </label>
        `)
        .join("");

      $("#options").html(optionsHtml);

      $("#prevBtn").prop("disabled", currentQuestion === 0);
      $("#nextBtn").text(
        currentQuestion === quizData.length - 1 ? "Finish" : "Next"
      );
    }

    function showResult() {
      let score = 0;

      userAnswers.forEach((ans, i) => {
        if (ans === quizData[i].answer) score++;
      });

      $(".quiz-container").html(`
        <h2>Quiz Completed 🎉</h2>
        <p>You answered <strong>${score}</strong> out of 
        <strong>${quizData.length}</strong> correctly.</p>
        <button id="restart">Restart Quiz</button>
      `);
    }

    $(document).on("click", "#nextBtn", function () {
      const selected = $("input[name='option']:checked").val();

      if (selected === undefined) {
        alert("Please select an answer before moving forward.");
        return;
      }

      userAnswers[currentQuestion] = Number(selected);

      if (currentQuestion === quizData.length - 1) {
        showResult();
      } else {
        currentQuestion++;
        loadQuestion();
      }
    });

    $(document).on("click", "#prevBtn", function () {
      if (currentQuestion > 0) {
        currentQuestion--;
        loadQuestion();
      }
    });

    $(document).on("click", "#restart", function () {
      currentQuestion = 0;
      userAnswers.fill(null);
      location.reload();
    });

    // Initialize first question
    loadQuestion();
  </script>

</body>
</html>
