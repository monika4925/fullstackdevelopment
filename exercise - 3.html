<!DOCTYPE html>
<html lang="en">
<body style="display: flex; justify-content: center; padding-top: 50px;">

    <div id="main-container" style="border: 2px solid black; padding: 20px; width: 400px; border-radius: 10px;">
       
        <center>
            <h1>Kcet Learning App</h1>
        </center>

        <hr>

        <div id="quiz-box">
            <p id="count"></p>
            <h3 id="question"></h3>
           
            <div id="options"></div>

            <br>
            <div style="display: flex; justify-content: space-between;">
                <button onclick="change(-1)">Previous</button>
                <button onclick="change(1)">Next</button>
            </div>
        </div>

        <div id="result-box" style="display: none; text-align: center;">
            <h2>Quiz Completed 🎉</h2>
            <p id="score"></p>
            <button onclick="location.reload()">Restart Quiz</button>
        </div>
    </div>

    <script>
        const quizData = [
            { q: "Python was created by?", o: ["James Gosling", "Guido van Rossum", "Dennis Ritchie", "Bjarne Stroustrup"], a: 1 },
            { q: "Which keyword is used to define a function in Python?", o: ["function", "def", "fun", "define"], a: 1 },
            { q: "Which symbol is used for comments in Python?", o: ["//", "#", "/*", "--"], a: 1 },
            { q: "Which data type is used for text in Python?", o: ["int", "float", "str", "bool"], a: 2 },
            { q: "Which function prints output in Python?", o: ["echo()", "write()", "print()", "output()"], a: 2 },
            { q: "What does GenAI stand for?", o: ["General AI", "Generated AI", "Generative AI", "Genius AI"], a: 2 },
            { q: "Generative AI is mainly used to?", o: ["Store data", "Create new content", "Delete files", "Speed hardware"], a: 1 },
            { q: "Which of these is an example of Generative AI output?", o: ["Images", "Text", "Music", "All of these"], a: 3 },
            { q: "Which language is widely used in AI development?", o: ["Python", "HTML", "CSS", "SQL"], a: 0 },
            { q: "GenAI can help in?", o: ["Content creation", "Coding help", "Image generation", "All of these"], a: 3 }
        ];

        let current = 0, answers = [];

        function load() {
            const data = quizData[current];
            document.getElementById('count').innerText = `Question ${current + 1} of ${quizData.length}`;
            document.getElementById('question').innerText = data.q;
           
            document.getElementById('options').innerHTML = data.o.map((opt, i) =>
                `<div style="margin-bottom: 5px;">
                    <input type="radio" name="opt" id="o${i}" value="${i}" ${answers[current] == i ? 'checked' : ''}>
                    <label for="o${i}">${opt}</label>
                </div>`
            ).join('');
        }

        window.change = (dir) => {
            const selected = document.querySelector('input[name="opt"]:checked');
            if (dir > 0 && !selected) return alert("Please select an answer");
            if (selected) answers[current] = parseInt(selected.value);
           
            current += dir;

            if (current >= quizData.length) {
                showResult();
            } else if (current >= 0) {
                load();
            } else {
                current = 0;
            }
        }

        function showResult() {
            const score = quizData.filter((q, i) => q.a === answers[i]).length;
            document.getElementById('quiz-box').style.display = 'none';
            document.getElementById('result-box').style.display = 'block';
            document.getElementById('score').innerText = `Your Score: ${score} / ${quizData.length}`;
        }

        load();
    </script>
</body>
</html>
